name: Deploy Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_message:
        description: Optional custom release message for Firebase Hosting
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Resolve deploy metadata
        run: |
          APP_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version)")
          SHORT_SHA="${GITHUB_SHA::7}"
          MANUAL_MESSAGE="${{ github.event.inputs.release_message || '' }}"

          if [ -n "$MANUAL_MESSAGE" ]; then
            DEPLOY_MESSAGE="$MANUAL_MESSAGE"
          else
            DEPLOY_MESSAGE="release v${APP_VERSION} (${SHORT_SHA})"
          fi

          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "DEPLOY_MESSAGE=$DEPLOY_MESSAGE" >> "$GITHUB_ENV"

      - name: Show deploy metadata
        run: echo "Deploying version $APP_VERSION with message '$DEPLOY_MESSAGE'"

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: yarn build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Prepare service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: firebase deploy --only hosting --project "$FIREBASE_PROJECT_ID" --message "$DEPLOY_MESSAGE" --non-interactive
